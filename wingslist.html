<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wings Recipes</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        background: #cc0000;
      }
      h1 {
        margin-bottom: 1.5rem;
        color: white;
      }
      .grid {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        max-width: 900px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 1.5rem;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }
      .card h2 {
        font-size: 1.1rem;
        margin: 0 0 0.4rem;
      }
      .card .desc {
        color: #555;
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
      }
      .card .meta {
        font-size: 0.85rem;
        color: #777;
        margin-bottom: 0.4rem;
      }
      .card .meta span {
        font-weight: bold;
        color: #444;
      }
      .card ul {
        margin: 0.4rem 0 0;
        padding-left: 1.2rem;
        font-size: 0.85rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Wings Recipes</h1>
    <div class="grid" id="cards"></div>

    <script>
      //fetch("/api/wings")
      fetch("http://localhost:3000/recipes")
        .then((res) => res.json())
        .then((recipes) => {
          const grid = document.getElementById("cards");
          recipes.forEach((recipe) => {
            const ingredientItems = recipe.ingredients
              .map((i) => `<li>${i}</li>`)
              .join("");

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
            <h2>${recipe.name}</h2>
            <p class="desc">${recipe.descShort}</p>
            <p class="meta">Category: <span>${recipe.category}</span></p>
            <p class="meta">Cooking method: <span>${recipe.cooking_method}</span></p>
            <p class="meta">Ingredients:</p>
            <ul>${ingredientItems}</ul>
          `;
            grid.appendChild(card);
          });
        })
        .catch((err) => {
          document.getElementById("cards").textContent =
            "Error loading recipes.";
          console.error(err);
        });
    </script>
    <script src="script.js"></script>
    <!-- Ensure this path is correct if script.js is also in /public -->
  </body>
</html>
